# Tape King curated catalog (TAPEKING_SITE_SCOPE.md §4 + §6, verified against
# bronze.products 2026-07-18; pack counts parsed from Amazon titles).
#
# NO prices and NO attribution URLs in this file — both sync from bronze via
# public.brand_site_products at build time, and per-roll / per-yard math is
# derived in src/lib/tapeking.js. Amazon SEO titles never render on-site (they
# stay in the DB as display_title for reference).
#
# `hidden` is the site-level kill switch (§6): all rungs display at launch, so
# every SKU here is hidden: false. Separately, five ASINs are currently hidden
# UPSTREAM via bronze.brand_site_product_overrides.hide_from_site (Quiet
# B07R188Y7Y, Duct B078X3F29Q/B07B9FQQNT, dispenser B01LWZ9EDP) — those rows
# never reach the build, and tapeking.js warns until the overrides are lifted.

lines:
  - slug: standard-clear
    name: Standard Clear
    blurb: The everyday workhorse
    family_keys: [B0B782VXFQ]
    representative_asin: B01K0Z9QYK

  - slug: ultra-thick
    name: Ultra Thick
    blurb: For heavy or high-value cartons
    family_keys: [B07CKPDC14]
    representative_asin: B072LGT8CX

  - slug: gaffers
    name: Gaffers
    blurb: Holds hard, removes clean
    family_keys: [B0DWLKTX1G]
    representative_asin: B01N48VBS7
    spec_override: CLOTH MATTE · 2" × 30 YD
    film_label: CLOTH

  - slug: duct-tape
    name: Duct Tape
    blurb: Tears by hand, sticks to rough surfaces
    family_keys: [B0DG2X4LHF]
    representative_asin: B078X3F29Q

  - slug: dispenser-guns
    name: Dispenser Guns
    blurb: Load once, seal all day
    family_keys: [B09KK6L3ZK]
    representative_asin: B077GCV6PH
    # Line-level truth only: the line spans 2" and 3" guns. Per-ASIN widths in
    # bronze titles are unreliable (scope §5.2) — confirm with Kennon before
    # the Dispensers PDP ships.
    spec_override: 2" & 3" · TAPE INCLUDED
    consumable: false

  - slug: utility-knives
    name: Utility Knives
    blurb: Retractable blades for the packing bench
    family_keys: [B0751PNK7W]
    representative_asin: B0751PNK7W
    spec_override: RETRACTABLE · MULTI-PACK
    consumable: false

