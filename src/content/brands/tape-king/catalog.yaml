    upc: '00199874393766'
    pack_count: 2
    roll_yards: 30
    chips: ['1.88" WIDE', 30 YD / ROLL, 2-PACK, SILVER]
    specs:
      - { label: BRAND, value: Grizzly Power }
      - { label: ROLL SIZE, value: 1.88 in × 30 yd }
      - { label: PACK, value: 2 rolls }
      - { label: COLOR, value: Silver }
      - { label: WATERPROOF, value: 'Yes' }
      - { label: MADE FOR, value: 'Repairs, sealing, wrapping, general fixes' }

