# Controlled "shop by need" taxonomy. Slugs are referenced from products/*.yaml
# and become /collections/<slug>/ routes in PR 5.
needs:
  - slug: neck-support
    display: Neck & shoulder support
    short: Pillows that keep the loft you choose, all night.
    intro: >-
      Most pillows make you adapt to them. Ours work the other way: adjustable
      shredded fill you tune to your sleep position, and low-profile designs
      for people who want less pillow, not more. Every option ships with a
      decade of Amazon reviews behind it.
  - slug: all-day-sitting
    display: All-day sitting
    short: Memory foam for desks, cars, and wheelchairs.
    intro: >-
      Eight hours in a chair is a comfort problem worth solving properly.
      Certified memory foam cushions that help relieve pressure on your
      tailbone and lower back — at your desk, in the car, or anywhere you sit
      longer than you'd like.
  - slug: elevated-rest
    display: Elevated rest
    short: Wedges and body pillows for reading, lounging, and side support.
    intro: >-
      Sometimes better rest is about angle, not softness. A 7-inch wedge for
      reading, lounging, and sleeping slightly elevated, and a full-length
      body pillow that gives side sleepers something to hold onto.
  - slug: refresh-refill
    display: Refill & refresh
    short: Shredded foam that brings cushions back to life.
    intro: >-
      The same shredded memory foam we fill our pillows with, sold by the
      pound. Restuff a flattened cushion, refill a bean bag, or top up a dog
      bed instead of replacing it.
