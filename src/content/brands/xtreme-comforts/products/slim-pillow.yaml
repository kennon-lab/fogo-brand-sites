# Standalone listing: the Slim King single. The other slim sizes and packs
# live inside the flagship family (Amazon's grouping) — see shredded-pillow.yaml.
family_key: B014E9UMHI
display_name: The Slim Low-Profile Pillow
tagline: Less pillow, on purpose.
category: pillows
needs: [neck-support]
hero_benefit: >-
  A deliberately low, cooling profile for people who sleep close to the
  mattress — most comfortable for stomach sleepers and anyone who finds a
  normal pillow pushes their head too far forward.
description_short: >-
  Low-profile memory foam made in the USA, designed for stomach and back
  sleepers who want minimal loft with real support.
description_long: >-
  Most pillows solve for height. This one solves for the opposite problem:
  sleepers who wake up with their neck bent upward because every pillow they
  try is simply too tall. The slim profile keeps your head close to the
  mattress while the memory foam still carries its weight, and the cooling
  design keeps the low profile from sleeping hot.


  Made in the USA, in a King size that spans the width of your pillowcase
  instead of sliding around in it.
badges: [made-in-usa, prime]
benefits:
  - icon: stomach
    title: Built for low sleepers
    body: >-
      Stomach and back sleepers usually need far less loft than a standard
      pillow provides. This one starts low and stays low.
  - icon: cooling
    title: Cooling by design
    body: >-
      A slim profile means less material holding heat, and the cooling design
      keeps air moving where your face is.
  - icon: made
    title: Made in the USA
    body: >-
      Manufactured domestically, with the same decade of Amazon review history
      behind it as the rest of the line.
who_its_for:
  fits:
    - Stomach sleepers who want their head nearly level with the mattress
    - Back sleepers who find standard pillows push their chin forward
  anti_fit: >-
    If you sleep on your side, you likely need more loft than a slim profile
    provides — the adjustable Shredded Memory Foam Pillow is the better pick.
  anti_fit_alternative: shredded-pillow
specs:
  - label: Profile
    value: Slim, low-loft
  - label: Material
    value: Memory foam, cooling design
  - label: Origin
    value: Made in the USA
  - label: Size
    value: King (Standard and Queen slim sizes are on the flagship pillow page)
faq:
  - q: How low is a slim pillow?
    a: >-
      Noticeably lower than a standard pillow — the point is to keep your neck
      close to neutral when you sleep face-down or flat on your back, rather
      than propping your head up.
  - q: Are there other sizes?
    a: >-
      Yes — Standard and Queen slim sizes, plus slim two-packs, are grouped
      with the Shredded Memory Foam Pillow listing on Amazon. This page is the
      King single.
variants:
  - { asin: B014E9UMHI, label: King }
